<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weather-warn</title>
    <meta name="description" content="災害情報を自動取得してテロップ表示するアプリ" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="badge">運用中</div>
        <div class="status" id="status">警報を確認中...</div>
      </header>

      <section class="ticker-shell" aria-label="警報テロップ">
        <div class="ticker" id="ticker">
          <span id="ticker-text">気象警報を取得しています...</span>
        </div>
      </section>

      <footer class="footer">
        <span id="updated-at">最終更新: --</span>
        <button id="refresh-btn" type="button">手動更新</button>
      </footer>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
