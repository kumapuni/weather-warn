<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>災害情報テロップ</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="screen">
      <section class="headline" id="headline">
        <div class="headline-label">最優先警報</div>
        <div class="headline-text" id="headline-text">読み込み中...</div>
      </section>
      <section class="status">
        <span id="updated-at">更新時刻: --</span>
        <button id="fullscreen-btn" type="button">全画面</button>
      </section>
      <section class="ticker" aria-live="polite">
        <div class="ticker-track" id="ticker-track">データを取得しています...</div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
